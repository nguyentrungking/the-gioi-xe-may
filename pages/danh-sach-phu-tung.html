<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh Sách Phụ Tùng</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>

  <div id="header"></div>

  <main class="container my-4">

    <h2 class="mb-4">Danh Sách Phụ Tùng</h2>

    <div class="row g-4">

      <aside class="col-md-3">

        <div class="mb-3">
          <label class="form-label fw-semibold">Tìm kiếm</label>
          <input type="text" id="search" class="form-control" placeholder="Tìm phụ tùng..." />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Giá tối đa</label>
          <input type="range" id="range-gia" class="form-range"
            min="0" max="900000" step="50000" value="900000" />
          <div class="d-flex justify-content-between">
            <small class="text-muted">0 đ</small>
            <small class="text-danger fw-bold" id="hien-thi-gia">900.000 đ</small>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Danh mục</label>
          <div id="danh-muc-filter"></div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Lọc theo xe</label>
          <div id="xe-filter"></div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Sắp xếp</label>
          <select id="sap-xep" class="form-select">
            <option value="mac-dinh">Mặc định</option>
            <option value="gia-tang">Giá: thấp → cao</option>
            <option value="gia-giam">Giá: cao → thấp</option>
            <option value="ten-az">Tên: A → Z</option>
          </select>
        </div>

        <button id="xoa-loc" class="btn btn-outline-secondary w-100">
          ↺ Xoá bộ lọc
        </button>

      </aside>

      <div class="col-md-9">

        <div id="danh-sach" class="row row-cols-1 row-cols-md-3 g-3"></div>

        <p id="khong-co" class="text-muted d-none">Không tìm thấy phụ tùng nào.</p>

        <nav class="mt-4 d-flex justify-content-center">
          <ul id="phan-trang" class="pagination"></ul>
        </nav>

      </div>

    </div>

  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="danh-sach-phu-tung.js"></script>

</body>
</html>
